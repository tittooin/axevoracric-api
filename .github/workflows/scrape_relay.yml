name: Cricket Data Relay

on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes (Professional Live Flow)
  workflow_dispatch: # Allow manual trigger

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Relay Scraper
        env:
          INGESTION_ENDPOINT: ${{ secrets.INGESTION_ENDPOINT }}
          INGESTION_TOKEN: ${{ secrets.INGESTION_TOKEN }}
        run: node relay_scraper.js
